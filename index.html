<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untitled</title>
  <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network Playground</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <i data-lucide="brain-circuit"></i>
      <span>Neural Network Playground</span>
    </div>
    <div class="header__badge">XOR Classifier</div>
  </header>

  <!-- Main Layout -->
  <main class="main">

    <!-- LEFT: Network Visualizer -->
    <section class="panel panel--network" aria-label="Network Visualizer">
      <div class="panel__header">
        <i data-lucide="cpu"></i>
        <h2>Network Architecture</h2>
        <span class="panel__sub">2 → 4 → 1</span>
      </div>
      <canvas id="network-canvas" width="480" height="340" aria-label="Neural network diagram"></canvas>
      <div class="activations-row">
        <div class="activation-pill" id="act-00">
          <span class="act-label">x₁=0, x₂=0</span>
          <span class="act-output" id="out-00">—</span>
        </div>
        <div class="activation-pill" id="act-01">
          <span class="act-label">x₁=0, x₂=1</span>
          <span class="act-output" id="out-01">—</span>
        </div>
        <div class="activation-pill" id="act-10">
          <span class="act-label">x₁=1, x₂=0</span>
          <span class="act-output" id="out-10">—</span>
        </div>
        <div class="activation-pill" id="act-11">
          <span class="act-label">x₁=1, x₂=1</span>
          <span class="act-output" id="out-11">—</span>
        </div>
      </div>
    </section>

    <!-- CENTER: Controls + Decision Boundary -->
    <section class="panel panel--controls" aria-label="Controls">
      <div class="panel__header">
        <i data-lucide="sliders-horizontal"></i>
        <h2>Training Controls</h2>
      </div>

      <div class="controls-grid">
        <div class="control-group">
          <label for="lr-slider">Learning Rate <span class="mono" id="lr-val">0.1</span></label>
          <input type="range" id="lr-slider" min="0.001" max="1" step="0.001" value="0.1" aria-label="Learning rate">
        </div>
        <div class="control-group">
          <label for="hidden-slider">Hidden Neurons <span class="mono" id="hidden-val">4</span></label>
          <input type="range" id="hidden-slider" min="2" max="8" step="1" value="4" aria-label="Hidden neurons">
        </div>
        <div class="control-group">
          <label for="activation-select">Activation</label>
          <select id="activation-select" aria-label="Activation function">
            <option value="sigmoid">Sigmoid</option>
            <option value="tanh">Tanh</option>
            <option value="relu">ReLU</option>
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn--primary" id="btn-train" aria-label="Start training">
          <i data-lucide="play"></i> Train
        </button>
        <button class="btn btn--ghost" id="btn-step" aria-label="Step one epoch">
          <i data-lucide="skip-forward"></i> Step
        </button>
        <button class="btn btn--danger" id="btn-reset" aria-label="Reset network">
          <i data-lucide="rotate-ccw"></i> Reset
        </button>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat__label">Epoch</span>
          <span class="stat__value mono" id="stat-epoch">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Loss</span>
          <span class="stat__value mono" id="stat-loss">—</span>
        </div>
        <div class="stat">
          <span class="stat__label">Accuracy</span>
          <span class="stat__value mono" id="stat-acc">—</span>
        </div>
      </div>

      <!-- Decision Boundary Canvas -->
      <div class="panel__header" style="margin-top:1rem">
        <i data-lucide="grid-3x3"></i>
        <h2>Decision Boundary</h2>
      </div>
      <canvas id="boundary-canvas" width="260" height="260" aria-label="Decision boundary heatmap"></canvas>
      <!-- XOR Points Legend -->
      <div class="legend-row">
        <span class="legend-dot legend-dot--zero"></span><span>XOR = 0</span>
        <span class="legend-dot legend-dot--one"></span><span>XOR = 1</span>
      </div>
    </section>

    <!-- RIGHT: Loss Chart -->
    <section class="panel panel--chart" aria-label="Loss Chart">
      <div class="panel__header">
        <i data-lucide="trending-down"></i>
        <h2>Training Loss</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="loss-chart" aria-label="Loss over epochs chart"></canvas>
      </div>

      <div class="panel__header" style="margin-top:1.25rem">
        <i data-lucide="table-2"></i>
        <h2>Truth Table</h2>
      </div>
      <table class="truth-table" aria-label="XOR truth table with predictions">
        <thead>
          <tr><th>x₁</th><th>x₂</th><th>Target</th><th>Predicted</th><th></th></tr>
        </thead>
        <tbody id="truth-table-body">
          <tr><td>0</td><td>0</td><td>0</td><td class="pred" id="pred-00">—</td><td class="verdict" id="verd-00"></td></tr>
          <tr><td>0</td><td>1</td><td>1</td><td class="pred" id="pred-01">—</td><td class="verdict" id="verd-01"></td></tr>
          <tr><td>1</td><td>0</td><td>1</td><td class="pred" id="pred-10">—</td><td class="verdict" id="verd-10"></td></tr>
          <tr><td>1</td><td>1</td><td>0</td><td class="pred" id="pred-11">—</td><td class="verdict" id="verd-11"></td></tr>
        </tbody>
      </table>

      <div class="speed-control">
        <label for="speed-slider"><i data-lucide="zap"></i> Speed</label>
        <input type="range" id="speed-slider" min="1" max="50" step="1" value="5" aria-label="Training speed">
        <span class="mono" id="speed-val">5×</span>
      </div>
    </section>
  </main>
</div>

  <script type="module" src="main.js"></script>
</body>
</html>
